<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6fb;
    color:#1d2a44;
}

.container{
    width:96%;
    max-width:1700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:52px;
    margin-bottom:8px;
    font-weight:800;
}

.subtitle{
    text-align:center;
    font-size:24px;
    color:#56637a;
    margin-bottom:30px;
}

.topbar{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:14px;
    padding:14px 24px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    background:#dfe5f1;
    color:#1d2a44;
    transition:0.2s;
}

button.active{
    background:#145cc7;
    color:white;
}

.layout{
    display:flex;
    gap:24px;
}

.left{
    flex:1;
}

.right{
    width:360px;
}

.panel{
    background:white;
    border-radius:24px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.chartPanel{
    height:900px;
}

canvas{
    width:100% !important;
    height:100% !important;
}

.sidebox{
    background:#182d5c;
    color:white;
    border-radius:24px;
    padding:30px;
    height:900px;
    box-sizing:border-box;
}

.sidebox h2{
    text-align:center;
    font-size:90px;
    margin:0;
}

.sidebox h3{
    text-align:center;
    margin-top:8px;
    margin-bottom:35px;
    color:#c7d3ea;
    letter-spacing:2px;
}

.rankItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    margin-bottom:12px;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    font-size:22px;
    font-weight:700;
}

.rankLeft{
    display:flex;
    align-items:center;
    gap:12px;
}

.france{
    background:linear-gradient(90deg,#204ea8,#e53a5e);
}

</style>
</head>

<body>

<div class="container">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin · Evolution historique des meilleures nations
</div>

<div class="topbar">
    <button id="btnRank" class="active">Classement</button>
    <button id="btnPoints">Points</button>

    <button id="btnAll" class="active">Toutes nations</button>
    <button id="btnFrance">Focus France</button>

    <button id="btnOverall" class="active">Overall</button>
    <button id="btnMen">Hommes</button>
    <button id="btnWomen">Dames</button>

    <button id="btnReplay">Rejouer animation</button>
</div>

<div class="layout">

<div class="left">

<div class="panel chartPanel">
<canvas id="chart"></canvas>
</div>

</div>

<div class="right">

<div class="sidebox">

<h2>2026</h2>

<h3>CLASSEMENT FINAL</h3>

<div id="rankingBox"></div>

</div>

</div>

</div>

</div>

<script>

let chart;

let currentMode="rank";
let currentView="all";
let currentGender="overall";

const nationColors={
    FRA:"#0057c8",
    AUT:"#d62828",
    SUI:"#2a9d8f",
    ITA:"#2b9348",
    USA:"#8d99ae",
    NOR:"#6c757d",
    SWE:"#9d4edd",
    GER:"#333333",
    CAN:"#f4a261",
    BRA:"#8ac926"
};

const nationNames={
    FRA:"France",
    AUT:"Autriche",
    SUI:"Suisse",
    ITA:"Italie",
    USA:"États-Unis",
    NOR:"Norvège",
    SWE:"Suède",
    GER:"Allemagne",
    CAN:"Canada",
    BRA:"Brésil"
};

const nationFlags={
    FRA:"🇫🇷",
    AUT:"🇦🇹",
    SUI:"🇨🇭",
    ITA:"🇮🇹",
    USA:"🇺🇸",
    NOR:"🇳🇴",
    SWE:"🇸🇪",
    GER:"🇩🇪",
    CAN:"🇨🇦",
    BRA:"🇧🇷"
};

async function loadData(){

    let file="data.json";

    if(currentGender==="men") file="data M.json";
    if(currentGender==="women") file="data W.json";

    const response=await fetch(file);
    return await response.json();
}

function activate(button){
    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
}

function setActive(id){
    document.getElementById(id).classList.add("active");
}

async function buildChart(animated=true){

    const raw=await loadData();

    const nations=[...new Set(raw.map(d=>d.Nation))];

    const seasons=[...new Set(raw.map(d=>d.Season))].sort((a,b)=>a-b);

    const datasets=[];

    nations.forEach(nation=>{

        const data=seasons.map(season=>{

            const found=raw.find(
                d=>d.Season===season && d.Nation===nation
            );

            if(!found) return null;

            return currentMode==="rank"
                ? found.NationRank
                : found.NationPoints;

        });

        const isFrance=nation==="FRA";

        datasets.push({
            label:nation,
            data:data,
            borderColor:nationColors[nation],
            backgroundColor:nationColors[nation],
            borderWidth:isFrance ? 8 : 3,
            tension:0,
            pointRadius:0,
            fill:false,
            stepped:true,
            borderDash:[],
            hidden:(currentView==="france" && !isFrance)
        });

    });

    if(chart) chart.destroy();

    const ctx=document.getElementById("chart");

    chart=new Chart(ctx,{
        type:"line",
        data:{
            labels:seasons,
            datasets:datasets
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,

            animation:animated ? {
                duration:2400,
                easing:"easeOutQuart"
            } : false,

            plugins:{
                legend:{
                    display:false
                },
                tooltip:{
                    enabled:true
                }
            },

            scales:{

                x:{
                    grid:{
                        color:"#d8dde8"
                    },
                    ticks:{
                        color:"#333",
                        font:{
                            size:18,
                            weight:"700"
                        }
                    },
                    title:{
                        display:true,
                        text:"Saison",
                        font:{
                            size:24,
                            weight:"700"
                        }
                    }
                },

                y:{
                    reverse:(currentMode==="rank"),

                    min:(currentMode==="rank") ? 1 : 0,
                    max:(currentMode==="rank") ? 10 : undefined,

                    grid:{
                        color:"#d8dde8"
                    },

                    ticks:{
                        color:"#333",
                        font:{
                            size:18,
                            weight:"700"
                        }
                    },

                    title:{
                        display:true,
                        text:(currentMode==="rank") ? "Rang mondial" : "Points",
                        font:{
                            size:24,
                            weight:"700"
                        }
                    }
                }
            }
        },

        plugins:[{

            id:"labels",

            afterDraw(chart){

                const {ctx}=chart;

                ctx.save();

                chart.data.datasets.forEach((dataset,i)=>{

                    if(dataset.hidden) return;

                    const meta=chart.getDatasetMeta(i);

                    if(!meta.data.length) return;

                    const point=meta.data[meta.data.length-1];

                    if(!point) return;

                    const x=point.x + 20;
                    const y=point.y;

                    const nation=dataset.label;

                    ctx.font=(nation==="FRA")
                        ? "bold 44px Arial"
                        : "bold 32px Arial";

                    ctx.fillStyle=nationColors[nation];

                    ctx.textAlign="left";
                    ctx.textBaseline="middle";

                    ctx.fillText(
                        nationFlags[nation]+" "+nationNames[nation],
                        x,
                        y
                    );

                });

                ctx.restore();

            }

        }]
    });

    buildRanking(raw);

}

function buildRanking(raw){

    const box=document.getElementById("rankingBox");

    const final=raw
        .filter(d=>d.Season===2026)
        .sort((a,b)=>a.NationRank-b.NationRank);

    box.innerHTML="";

    final.forEach(d=>{

        const div=document.createElement("div");

        div.className="rankItem";

        if(d.Nation==="FRA"){
            div.classList.add("france");
        }

        div.innerHTML=`
            <div class="rankLeft">
                <div>${d.NationRank}</div>
                <div>${nationFlags[d.Nation]}</div>
                <div>${nationNames[d.Nation]}</div>
            </div>

            <div>${d.NationPoints}</div>
        `;

        box.appendChild(div);

    });

}

document.getElementById("btnRank").onclick=()=>{
    currentMode="rank";
    activate();
    setActive("btnRank");
    buildChart(false);
};

document.getElementById("btnPoints").onclick=()=>{
    currentMode="points";
    activate();
    setActive("btnPoints");
    buildChart(false);
};

document.getElementById("btnAll").onclick=()=>{
    currentView="all";
    buildChart(false);
};

document.getElementById("btnFrance").onclick=()=>{
    currentView="france";
    buildChart(false);
};

document.getElementById("btnOverall").onclick=()=>{
    currentGender="overall";
    buildChart(false);
};

document.getElementById("btnMen").onclick=()=>{
    currentGender="men";
    buildChart(false);
};

document.getElementById("btnWomen").onclick=()=>{
    currentGender="women";
    buildChart(false);
};

document.getElementById("btnReplay").onclick=()=>{
    buildChart(true);
};

buildChart(true);

</script>

</body>
</html>
