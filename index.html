<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FIS Alpine Nations Ranking</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:96%;
    max-width:1700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:34px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    background:#e9ecef;
    transition:0.2s;
}

button.active{
    background:#0057b8;
    color:white;
}

.chart-container{
    position:relative;
    height:78vh;
}

</style>
</head>

<body>

<div class="container">

    <h1>FIS Alpine Nations Ranking</h1>

    <div class="subtitle">
        Evolution des meilleures nations alpines de 1970 à 2026
    </div>

    <div class="controls">
        <button id="btnRank" class="active">Classement</button>
        <button id="btnPoints">Points</button>

        <button id="btnAll" class="active">Overall</button>
        <button id="btnMen">Men</button>
        <button id="btnLadies">Ladies</button>
    </div>

    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

</div>

<script>

let currentMode='rank';
let currentGender='overall';

const nationColors={
    FRA:'#0057b8',
    AUT:'#d62828',
    SUI:'#2a9d8f',
    ITA:'#2b9348',
    USA:'#7b8794',
    NOR:'#8d99ae',
    GER:'#111111',
    CAN:'#ff8800',
    SWE:'#9d4edd',
    BRA:'#2dc653'
};

const nationFlags={
    FRA:'🇫🇷',
    AUT:'🇦🇹',
    SUI:'🇨🇭',
    ITA:'🇮🇹',
    USA:'🇺🇸',
    NOR:'🇳🇴',
    GER:'🇩🇪',
    CAN:'🇨🇦',
    SWE:'🇸🇪',
    BRA:'🇧🇷'
};

async function loadData(){

    let file='data_overall.json';

    if(currentGender==='men'){
        file='data_men.json';
    }

    if(currentGender==='ladies'){
        file='data_ladies.json';
    }

    const response=await fetch(file);
    return await response.json();
}

let chart;

async function buildChart(){

    const data=await loadData();

    const nations=[
        ...new Set(
            data
            .map(d=>d.Nation)
            .filter(n=>n!=='FIN')
        )
    ];

    const seasons=[
        ...new Set(data.map(d=>d.Season))
    ].sort((a,b)=>a-b);

    const datasets=nations.map(nation=>{

        const values=seasons.map(season=>{

            const found=data.find(
                d=>
                    d.Season===season
                    && d.Nation===nation
            );

            if(!found){
                return null;
            }

            return currentMode==='rank'
                ? found.NationRank
                : found.NationPoints;
        });

        return{

            label:nation,

            data:values,

            borderColor:nationColors[nation] || '#999',

            backgroundColor:nationColors[nation] || '#999',

            borderWidth:nation==='FRA' ? 5 : 2,

            pointRadius:0,

            tension:0.25,

            borderDash:[],

            spanGaps:false
        };
    });

    if(chart){
        chart.destroy();
    }

    const ctx=document.getElementById('chart');

    chart=new Chart(ctx,{

        type:'line',

        data:{
            labels:seasons,
            datasets:datasets
        },

        options:{

            responsive:true,
            maintainAspectRatio:false,

            interaction:{
                mode:'nearest',
                intersect:false
            },

            plugins:{

                legend:{
                    display:false
                },

                tooltip:{
                    callbacks:{
                        label:function(context){

                            const nation=context.dataset.label;
                            const value=context.raw;

                            if(currentMode==='rank'){
                                return nation+' : rank '+value;
                            }

                            return nation+' : '+value+' pts';
                        }
                    }
                }
            },

            scales:{

                y:{

                    reverse:currentMode==='rank',

                    min:currentMode==='rank' ? 1 : undefined,

                    max:currentMode==='rank' ? 10 : undefined,

                    ticks:{
                        stepSize:1,
                        color:'#444',
                        font:{
                            size:13
                        }
                    },

                    grid:{
                        color:'#e5e5e5'
                    }
                },

                x:{

                    ticks:{
                        color:'#444',
                        maxTicksLimit:20
                    },

                    grid:{
                        color:'#f2f2f2'
                    }
                }
            },

            animation:false
        },

        plugins:[{

            id:'labels',

            afterDatasetsDraw(chart,args,pluginOptions){

                const {ctx}=chart;

                ctx.save();

                chart.data.datasets.forEach((dataset,i)=>{

                    const meta=chart.getDatasetMeta(i);

                    if(!meta.data.length){
                        return;
                    }

                    const lastPoint=
                        meta.data[meta.data.length-1];

                    if(!lastPoint){
                        return;
                    }

                    const nation=dataset.label;

                    ctx.fillStyle=dataset.borderColor;

                    ctx.font=
                        nation==='FRA'
                        ? 'bold 18px Arial'
                        : '14px Arial';

                    ctx.textAlign='left';

                    ctx.fillText(
                        `${nationFlags[nation] || ''} ${nation}`,
                        lastPoint.x + 10,
                        lastPoint.y + 5
                    );
                });

                ctx.restore();
            }
        }]
    });
}

document.getElementById('btnRank').onclick=()=>{

    currentMode='rank';

    document.getElementById('btnRank')
        .classList.add('active');

    document.getElementById('btnPoints')
        .classList.remove('active');

    buildChart();
};

document.getElementById('btnPoints').onclick=()=>{

    currentMode='points';

    document.getElementById('btnPoints')
        .classList.add('active');

    document.getElementById('btnRank')
        .classList.remove('active');

    buildChart();
};

document.getElementById('btnAll').onclick=()=>{

    currentGender='overall';

    document.getElementById('btnAll')
        .classList.add('active');

    document.getElementById('btnMen')
        .classList.remove('active');

    document.getElementById('btnLadies')
        .classList.remove('active');

    buildChart();
};

document.getElementById('btnMen').onclick=()=>{

    currentGender='men';

    document.getElementById('btnMen')
        .classList.add('active');

    document.getElementById('btnAll')
        .classList.remove('active');

    document.getElementById('btnLadies')
        .classList.remove('active');

    buildChart();
};

document.getElementById('btnLadies').onclick=()=>{

    currentGender='ladies';

    document.getElementById('btnLadies')
        .classList.add('active');

    document.getElementById('btnAll')
        .classList.remove('active');

    document.getElementById('btnMen')
        .classList.remove('active');

    buildChart();
};

buildChart();

</script>

</body>
</html>
