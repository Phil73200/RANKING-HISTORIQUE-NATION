<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6fb;
    color:#1d2a44;
}

.wrapper{
    width:95%;
    max-width:1600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:25px;
    font-size:18px;
}

.topbar{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:12px 22px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    font-size:15px;
    background:#dbe3f0;
    color:#1d2a44;
}

button.active{
    background:#165ac7;
    color:white;
}

.main{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    align-items:start;
}

.chartCard{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.side{
    background:#132a58;
    color:white;
    border-radius:24px;
    padding:25px;
    position:sticky;
    top:20px;
}

.side h2{
    margin-top:0;
    text-align:center;
    font-size:52px;
}

.sideTitle{
    text-align:center;
    letter-spacing:2px;
    opacity:.8;
    margin-bottom:10px;
}

.rankItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    font-size:18px;
}

.rankItem.fr{
    background:linear-gradient(90deg,#1d4ed8,#dc2626);
    font-weight:bold;
}

canvas{
    height:780px !important;
}

@media(max-width:1200px){
    .main{
        grid-template-columns:1fr;
    }

    .side{
        position:relative;
    }

    canvas{
        height:600px !important;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <h1>Classement mondial des nations</h1>

    <div class="subtitle">
        Coupe du Monde de ski alpin • Evolution historique des meilleures nations
    </div>

    <div class="topbar">
        <button id="btnOverall" class="active">Overall</button>
        <button id="btnMen">Hommes</button>
        <button id="btnWomen">Dames</button>
        <button id="btnFrance">Focus France</button>
        <button id="btnReplay">Rejouer animation</button>
    </div>

    <div class="main">

        <div class="chartCard">
            <canvas id="chart"></canvas>
        </div>

        <div class="side">
            <div class="sideTitle">CLASSEMENT FINAL</div>
            <h2>2026</h2>

            <div id="ranking"></div>
        </div>

    </div>

</div>

<script>

const COLORS = {
    FRA:"#1358c8",
    AUT:"#ef4444",
    SUI:"#14b8a6",
    ITA:"#16a34a",
    USA:"#94a3b8",
    NOR:"#6b7280",
    SWE:"#a855f7",
    GER:"#222222",
    CAN:"#fb923c",
    BRA:"#84cc16"
};

const FLAGS = {
    FRA:"🇫🇷 France",
    AUT:"🇦🇹 Autriche",
    SUI:"🇨🇭 Suisse",
    ITA:"🇮🇹 Italie",
    USA:"🇺🇸 États-Unis",
    NOR:"🇳🇴 Norvège",
    SWE:"🇸🇪 Suède",
    GER:"🇩🇪 Allemagne",
    CAN:"🇨🇦 Canada",
    BRA:"🇧🇷 Brésil"
};

let currentMode = "overall";
let focusFrance = false;

let chart;
let allData = [];
let menData = [];
let womenData = [];

async function loadData(){

    const overall = await fetch("data.json").then(r=>r.json());
    const men = await fetch("dataM.json").then(r=>r.json());
    const women = await fetch("dataW.json").then(r=>r.json());

    allData = overall;
    menData = men;
    womenData = women;

    buildChart();
}

function getCurrentData(){
    if(currentMode==="men") return menData;
    if(currentMode==="women") return womenData;
    return allData;
}

function buildChart(){

    const data = getCurrentData();

    const years = [...new Set(data.map(d=>d.Season))];

    const nations = [...new Set(data.map(d=>d.Nation))];

    const datasets = nations.map(nation=>{

        const nationData = years.map(year=>{
            const found = data.find(
                d=>d.Season===year && d.Nation===nation
            );

            return found ? found.NationRank : null;
        });

        const isFrance = nation==="FRA";

        return {
            label: nation,
            data: nationData,
            borderColor: COLORS[nation] || "#999",
            backgroundColor:"transparent",
            borderWidth: isFrance ? 6 : 2,
            tension:0.35,
            pointRadius:0,
            borderCapStyle:'round',
            borderJoinStyle:'round',
            hidden: focusFrance && !isFrance,
            animation:{
                duration:2000
            }
        };
    });

    if(chart) chart.destroy();

    chart = new Chart(
        document.getElementById("chart"),
        {
            type:"line",
            data:{
                labels:years,
                datasets
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,

                interaction:{
                    mode:"nearest",
                    intersect:false
                },

                plugins:{
                    legend:{
                        display:false
                    },
                    tooltip:{
                        callbacks:{
                            title:(ctx)=>{
                                return "Saison " + ctx[0].label;
                            },
                            label:(ctx)=>{
                                return FLAGS[ctx.dataset.label] +
                                    " • Rang " + ctx.parsed.y;
                            }
                        }
                    }
                },

                scales:{
                    y:{
                        reverse:true,
                        min:1,
                        max:10,
                        ticks:{
                            stepSize:1,
                            color:"#111",
                            font:{
                                size:20,
                                weight:"bold"
                            }
                        },
                        title:{
                            display:true,
                            text:"Rang mondial",
                            color:"#222",
                            font:{
                                size:24,
                                weight:"bold"
                            }
                        },
                        grid:{
                            color:"rgba(0,0,0,.08)"
                        }
                    },

                    x:{
                        ticks:{
                            color:"#111",
                            font:{
                                size:16
                            }
                        },
                        title:{
                            display:true,
                            text:"Saison",
                            color:"#222",
                            font:{
                                size:24,
                                weight:"bold"
                            }
                        },
                        grid:{
                            color:"rgba(0,0,0,.06)"
                        }
                    }
                },

                animation:{
                    duration:2200,
                    easing:"easeOutQuart"
                }
            },

            plugins:[{
                id:"labels",

                afterDraw(chart){

                    const {
                        ctx,
                        chartArea:{right}
                    } = chart;

                    ctx.save();

                    chart.data.datasets.forEach((dataset,i)=>{

                        if(dataset.hidden) return;

                        const meta = chart.getDatasetMeta(i);

                        const lastPoint =
                            meta.data[meta.data.length-1];

                        if(!lastPoint) return;

                        ctx.font =
                            dataset.label==="FRA"
                            ? "bold 28px Arial"
                            : "bold 22px Arial";

                        ctx.fillStyle =
                            COLORS[dataset.label];

                        ctx.textAlign="left";

                        ctx.fillText(
                            FLAGS[dataset.label],
                            right + 35,
                            lastPoint.y + 8
                        );

                    });

                    ctx.restore();
                }
            }]
        }
    );

    buildRanking();
}

function buildRanking(){

    const data = getCurrentData();

    const final = data
        .filter(d=>d.Season===2026)
        .sort((a,b)=>a.NationRank-b.NationRank);

    const ranking = document.getElementById("ranking");

    ranking.innerHTML="";

    final.forEach(row=>{

        const div = document.createElement("div");

        div.className =
            row.Nation==="FRA"
            ? "rankItem fr"
            : "rankItem";

        div.innerHTML = `
            <div>
                ${row.NationRank}. ${FLAGS[row.Nation]}
            </div>

            <div>
                ${row.NationPoints}
            </div>
        `;

        ranking.appendChild(div);
    });
}

document.getElementById("btnOverall")
.onclick = ()=>{

    currentMode="overall";

    activate("btnOverall");

    buildChart();
};

document.getElementById("btnMen")
.onclick = ()=>{

    currentMode="men";

    activate("btnMen");

    buildChart();
};

document.getElementById("btnWomen")
.onclick = ()=>{

    currentMode="women";

    activate("btnWomen");

    buildChart();
};

document.getElementById("btnFrance")
.onclick = ()=>{

    focusFrance = !focusFrance;

    document
        .getElementById("btnFrance")
        .classList.toggle("active");

    buildChart();
};

document.getElementById("btnReplay")
.onclick = ()=>{

    buildChart();
};

function activate(id){

    document
        .querySelectorAll("button")
        .forEach(b=>b.classList.remove("active"));

    document
        .getElementById(id)
        .classList.add("active");

    if(focusFrance){
        document
            .getElementById("btnFrance")
            .classList.add("active");
    }
}

loadData();

</script>

</body>
</html>
