<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    background:#f5f7fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#1d2a44;
}

.wrapper{
    width:96%;
    max-width:1700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:54px;
    margin-bottom:5px;
    font-weight:800;
}

.subtitle{
    text-align:center;
    font-size:24px;
    color:#5f6f89;
    margin-bottom:28px;
}

.controls{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:14px;
    padding:13px 22px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    background:#dfe5f1;
    color:#1d2a44;
    transition:0.2s;
}

button.active{
    background:#135ec9;
    color:white;
}

.layout{
    display:flex;
    gap:22px;
}

.left{
    flex:1;
}

.right{
    width:350px;
}

.panel{
    background:white;
    border-radius:24px;
    box-shadow:0 5px 18px rgba(0,0,0,0.08);
    padding:20px;
}

.chartPanel{
    height:880px;
}

canvas{
    width:100% !important;
    height:100% !important;
}

.sidebox{
    background:#172d5d;
    border-radius:24px;
    color:white;
    height:880px;
    padding:30px;
    box-sizing:border-box;
}

.year{
    text-align:center;
    font-size:92px;
    font-weight:800;
    margin-top:10px;
}

.sideTitle{
    text-align:center;
    font-size:18px;
    letter-spacing:2px;
    color:#b8c5df;
    margin-bottom:35px;
}

.rankItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:14px 18px;
    margin-bottom:12px;
    font-size:22px;
    font-weight:700;
}

.rankLeft{
    display:flex;
    align-items:center;
    gap:12px;
}

.france{
    background:linear-gradient(90deg,#204ea8,#d63c64);
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin · Evolution historique des meilleures nations
</div>

<div class="controls">

<button id="rankBtn" class="active">Classement</button>
<button id="pointsBtn">Points</button>

<button id="allBtn" class="active">Toutes nations</button>
<button id="franceBtn">Focus France</button>

<button id="overallBtn" class="active">Overall</button>
<button id="menBtn">Hommes</button>
<button id="womenBtn">Dames</button>

<button id="replayBtn">Rejouer animation</button>

</div>

<div class="layout">

<div class="left">

<div class="panel chartPanel">
<canvas id="chart"></canvas>
</div>

</div>

<div class="right">

<div class="sidebox">

<div class="year">2026</div>

<div class="sideTitle">
CLASSEMENT FINAL
</div>

<div id="ranking"></div>

</div>

</div>

</div>

</div>

<script>

let chart;

let currentMode = "rank";
let currentView = "all";
let currentGender = "overall";

const nationColors = {
    FRA:"#0057c8",
    AUT:"#d62828",
    SUI:"#2a9d8f",
    ITA:"#2b9348",
    USA:"#8d99ae",
    NOR:"#6c757d",
    SWE:"#9d4edd",
    GER:"#333333",
    CAN:"#f4a261",
    BRA:"#6abf69"
};

const nationNames = {
    FRA:"France",
    AUT:"Autriche",
    SUI:"Suisse",
    ITA:"Italie",
    USA:"États-Unis",
    NOR:"Norvège",
    SWE:"Suède",
    GER:"Allemagne",
    CAN:"Canada",
    BRA:"Brésil"
};

const nationFlags = {
    FRA:"🇫🇷",
    AUT:"🇦🇹",
    SUI:"🇨🇭",
    ITA:"🇮🇹",
    USA:"🇺🇸",
    NOR:"🇳🇴",
    SWE:"🇸🇪",
    GER:"🇩🇪",
    CAN:"🇨🇦",
    BRA:"🇧🇷"
};

async function loadData(){

    let file = "data.json";

    if(currentGender === "men") file = "data M.json";
    if(currentGender === "women") file = "data W.json";

    const response = await fetch(file);

    return await response.json();
}

async function buildChart(animated=true){

    const raw = await loadData();

    const nations = [...new Set(raw.map(d=>d.Nation))];

    const seasons = [...new Set(raw.map(d=>d.Season))].sort((a,b)=>a-b);

    const datasets = [];

    nations.forEach(nation=>{

        const isFrance = nation === "FRA";

        const values = seasons.map(season=>{

            const found = raw.find(
                d=>d.Season===season && d.Nation===nation
            );

            if(!found) return null;

            return currentMode==="rank"
                ? found.NationRank
                : found.NationPoints;
        });

        datasets.push({

            label:nation,

            data:values,

            borderColor:nationColors[nation],

            backgroundColor:nationColors[nation],

            borderWidth:isFrance ? 6 : 2.2,

            pointRadius:0,

            stepped:true,

            tension:0,

            fill:false,

            hidden:(currentView==="france" && !isFrance)

        });

    });

    if(chart) chart.destroy();

    const ctx = document.getElementById("chart");

    chart = new Chart(ctx,{

        type:"line",

        data:{
            labels:seasons,
            datasets:datasets
        },

        options:{

            responsive:true,
            maintainAspectRatio:false,

            animation:animated ? {
                duration:1800,
                easing:"easeOutQuart"
            } : false,

            plugins:{
                legend:{
                    display:false
                }
            },

            scales:{

                x:{
                    grid:{
                        color:"#d7deea"
                    },
                    ticks:{
                        color:"#333",
                        font:{
                            size:16,
                            weight:"700"
                        }
                    },
                    title:{
                        display:true,
                        text:"Saison",
                        font:{
                            size:24,
                            weight:"700"
                        }
                    }
                },

                y:{

                    reverse:(currentMode==="rank"),

                    min:(currentMode==="rank") ? 1 : 0,

                    max:(currentMode==="rank") ? 10 : undefined,

                    grid:{
                        color:"#d7deea"
                    },

                    ticks:{
                        color:"#333",
                        font:{
                            size:16,
                            weight:"700"
                        }
                    },

                    title:{
                        display:true,
                        text:(currentMode==="rank") ? "Rang mondial" : "Points",
                        font:{
                            size:24,
                            weight:"700"
                        }
                    }
                }
            }
        },

        plugins:[{

            id:"labels",

            afterDraw(chart){

                const {ctx} = chart;

                ctx.save();

                const positions=[];

                chart.data.datasets.forEach((dataset,i)=>{

                    if(dataset.hidden) return;

                    const meta = chart.getDatasetMeta(i);

                    const point = meta.data[meta.data.length-1];

                    if(!point) return;

                    let y = point.y;

                    while(positions.some(p=>Math.abs(p-y)<32)){
                        y += 28;
                    }

                    positions.push(y);

                    const nation = dataset.label;

                    const x = point.x + 40;

                    ctx.textAlign="left";
                    ctx.textBaseline="middle";

                    ctx.font = (nation==="FRA")
                        ? "bold 24px Arial"
                        : "bold 20px Arial";

                    ctx.fillStyle = nationColors[nation];

                    ctx.fillText(
                        nationFlags[nation] + " " + nationNames[nation],
                        x,
                        y
                    );

                });

                ctx.restore();

            }

        }]
    });

    buildRanking(raw);

}

function buildRanking(raw){

    const final = raw
        .filter(d=>d.Season===2026)
        .sort((a,b)=>a.NationRank-b.NationRank);

    const ranking = document.getElementById("ranking");

    ranking.innerHTML="";

    final.forEach(d=>{

        const div = document.createElement("div");

        div.className = "rankItem";

        if(d.Nation==="FRA"){
            div.classList.add("france");
        }

        div.innerHTML=`
            <div class="rankLeft">
                <div>${d.NationRank}</div>
                <div>${nationFlags[d.Nation]}</div>
                <div>${nationNames[d.Nation]}</div>
            </div>

            <div>${d.NationPoints}</div>
        `;

        ranking.appendChild(div);

    });

}

function resetButtons(group){

    group.forEach(id=>{
        document.getElementById(id).classList.remove("active");
    });

}

document.getElementById("rankBtn").onclick=()=>{

    currentMode="rank";

    resetButtons(["rankBtn","pointsBtn"]);

    document.getElementById("rankBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("pointsBtn").onclick=()=>{

    currentMode="points";

    resetButtons(["rankBtn","pointsBtn"]);

    document.getElementById("pointsBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("allBtn").onclick=()=>{

    currentView="all";

    resetButtons(["allBtn","franceBtn"]);

    document.getElementById("allBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("franceBtn").onclick=()=>{

    currentView="france";

    resetButtons(["allBtn","franceBtn"]);

    document.getElementById("franceBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("overallBtn").onclick=()=>{

    currentGender="overall";

    resetButtons(["overallBtn","menBtn","womenBtn"]);

    document.getElementById("overallBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("menBtn").onclick=()=>{

    currentGender="men";

    resetButtons(["overallBtn","menBtn","womenBtn"]);

    document.getElementById("menBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("womenBtn").onclick=()=>{

    currentGender="women";

    resetButtons(["overallBtn","menBtn","womenBtn"]);

    document.getElementById("womenBtn").classList.add("active");

    buildChart(false);
};

document.getElementById("replayBtn").onclick=()=>{

    buildChart(true);

};

buildChart(true);

</script>

</body>
</html>
