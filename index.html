<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>

body{
    margin:0;
    background:#f5f6fa;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:96%;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:5px;
    color:#14213d;
}

.subtitle{
    text-align:center;
    color:#667085;
    margin-bottom:20px;
    font-size:18px;
}

.top-controls{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:12px;
    padding:10px 18px;
    cursor:pointer;
    font-weight:bold;
    background:#dbe4f0;
}

button.active{
    background:#0057b8;
    color:white;
}

.layout{
    display:flex;
    gap:20px;
}

.chart-card{
    flex:1;
    background:white;
    border-radius:24px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

#chart{
    width:100%;
    height:78vh;
}

.sidepanel{
    width:320px;
    background:#14213d;
    border-radius:24px;
    padding:24px;
    color:white;
}

.sidepanel h2{
    text-align:center;
    font-size:48px;
    margin:0;
}

.sidepanel p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.08);
}

.france{
    background:linear-gradient(
        90deg,
        rgba(0,87,184,0.6),
        rgba(220,38,38,0.6)
    );
}

</style>
</head>

<body>

<div class="container">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin · Evolution historique des meilleures nations
</div>

<div class="top-controls">

<button id="btnRank" class="active">Classement</button>
<button id="btnPoints">Points</button>

<button id="btnAll" class="active">Toutes nations</button>
<button id="btnFrance">Focus France</button>

<button id="btnOverall" class="active">Overall</button>
<button id="btnMen">Hommes</button>
<button id="btnLadies">Dames</button>

<button id="btnReplay">Rejouer animation</button>

</div>

<div class="layout">

<div class="chart-card">
<div id="chart"></div>
</div>

<div class="sidepanel">

<h2>2026</h2>

<p>Classement final</p>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

let currentMode='rank';
let currentGender='overall';
let franceOnly=false;

const colors={
FRA:'#0057b8',
AUT:'#d62828',
SUI:'#2a9d8f',
ITA:'#43aa8b',
USA:'#8d99ae',
NOR:'#6c757d',
GER:'#222222',
CAN:'#f4a261',
SWE:'#9d4edd',
BRA:'#52b788'
};

const flags={
FRA:'🇫🇷',
AUT:'🇦🇹',
SUI:'🇨🇭',
ITA:'🇮🇹',
USA:'🇺🇸',
NOR:'🇳🇴',
GER:'🇩🇪',
CAN:'🇨🇦',
SWE:'🇸🇪',
BRA:'🇧🇷'
};

const names={
FRA:'France',
AUT:'Autriche',
SUI:'Suisse',
ITA:'Italie',
USA:'États-Unis',
NOR:'Norvège',
GER:'Allemagne',
CAN:'Canada',
SWE:'Suède',
BRA:'Brésil'
};

let fullData=[];

async function loadData(){

    let file='data.json';

    if(currentGender==='men'){
        file='data M.json';
    }

    if(currentGender==='ladies'){
        file='data W.json';
    }

    const response=await fetch(file);

    return await response.json();
}

async function init(){

    fullData=await loadData();

    animateChart();

    buildRanking();
}

function animateChart(){

    const nations=[
        ...new Set(fullData.map(d=>d.Nation))
    ];

    const traces=[];

    const endLabels=[];

    nations.forEach(nation=>{

        if(franceOnly && nation!=='FRA'){
            return;
        }

        const rows=fullData
        .filter(d=>d.Nation===nation)
        .sort((a,b)=>a.Season-b.Season);

        const x=rows.map(r=>r.Season);

        const y=rows.map(r=>
            currentMode==='rank'
            ? r.NationRank
            : r.NationPoints
        );

        const finalY=y[y.length-1];

        endLabels.push({
            nation,
            y:finalY
        });

        traces.push({

            x:[],
            y:[],

            mode:'lines',

            line:{
                color:colors[nation],
                width:nation==='FRA' ? 7 : 3,
                shape:'hv'
            },

            opacity:
                nation==='FRA'
                ? 1
                : franceOnly
                    ? 0
                    : 0.45,

            hovertemplate:
                '<b>'+names[nation]+'</b><br>'+
                'Saison %{x}<br>'+
                (
                    currentMode==='rank'
                    ? 'Rang %{y}'
                    : 'Points %{y}'
                )+
                '<extra></extra>'
        });

        traces[traces.length-1].fullX=x;
        traces[traces.length-1].fullY=y;
    });

    endLabels.sort((a,b)=>a.y-b.y);

    const annotations=[];

    endLabels.forEach((item,index)=>{

        annotations.push({

            x:2028,
            y:item.y + (index*0.15),

            text:
                flags[item.nation]
                +' <b>'
                + names[item.nation]
                + '</b>',

            showarrow:false,

            font:{
                size:item.nation==='FRA' ? 24 : 18,
                color:colors[item.nation]
            },

            xanchor:'left'
        });
    });

    const layout={

        paper_bgcolor:'white',
        plot_bgcolor:'white',

        margin:{
            l:80,
            r:260,
            t:20,
            b:60
        },

        annotations:annotations,

        xaxis:{
            title:'Saison',
            gridcolor:'#e5e7eb',
            dtick:5
        },

        yaxis:{

            title:
                currentMode==='rank'
                ? 'Rang mondial'
                : 'Points',

            autorange:
                currentMode==='rank'
                ? 'reversed'
                : true,

            range:
                currentMode==='rank'
                ? [10,1]
                : undefined,

            gridcolor:'#e5e7eb'
        },

        showlegend:false
    };

    Plotly.newPlot(
        'chart',
        traces,
        layout,
        {
            responsive:true,
            displayModeBar:false
        }
    );

    let frame=0;

    const maxLength=Math.max(
        ...traces.map(t=>t.fullX.length)
    );

    const interval=setInterval(()=>{

        const update={
            x:[],
            y:[]
        };

        traces.forEach(trace=>{

            update.x.push(
                trace.fullX.slice(0,frame+1)
            );

            update.y.push(
                trace.fullY.slice(0,frame+1)
            );
        });

        Plotly.update(
            'chart',
            update
        );

        frame+=4;

        if(frame>maxLength){
            clearInterval(interval);
        }

    },35);
}

function buildRanking(){

    const ranking=document.getElementById('ranking');

    ranking.innerHTML='';

    const final2026=fullData
    .filter(d=>d.Season===2026)
    .sort((a,b)=>a.NationRank-b.NationRank);

    final2026.forEach(row=>{

        if(franceOnly && row.Nation!=='FRA'){
            return;
        }

        const div=document.createElement('div');

        div.className='rank-item';

        if(row.Nation==='FRA'){
            div.classList.add('france');
        }

        div.innerHTML=`

        <div>
        <b>${row.NationRank}</b>
        ${flags[row.Nation]}
        ${names[row.Nation]}
        </div>

        <b>${row.NationPoints}</b>
        `;

        ranking.appendChild(div);
    });
}

function activate(id,list){

    list.forEach(btn=>{

        document
        .getElementById(btn)
        .classList
        .remove('active');
    });

    document
    .getElementById(id)
    .classList
    .add('active');
}

document.getElementById('btnRank').onclick=()=>{

    currentMode='rank';

    activate('btnRank',['btnRank','btnPoints']);

    animateChart();
};

document.getElementById('btnPoints').onclick=()=>{

    currentMode='points';

    activate('btnPoints',['btnRank','btnPoints']);

    animateChart();
};

document.getElementById('btnAll').onclick=()=>{

    franceOnly=false;

    activate('btnAll',['btnAll','btnFrance']);

    animateChart();
};

document.getElementById('btnFrance').onclick=()=>{

    franceOnly=true;

    activate('btnFrance',['btnAll','btnFrance']);

    animateChart();
};

document.getElementById('btnOverall').onclick=async()=>{

    currentGender='overall';

    activate(
        'btnOverall',
        ['btnOverall','btnMen','btnLadies']
    );

    await init();
};

document.getElementById('btnMen').onclick=async()=>{

    currentGender='men';

    activate(
        'btnMen',
        ['btnOverall','btnMen','btnLadies']
    );

    await init();
};

document.getElementById('btnLadies').onclick=async()=>{

    currentGender='ladies';

    activate(
        'btnLadies',
        ['btnOverall','btnMen','btnLadies']
    );

    await init();
};

document.getElementById('btnReplay').onclick=()=>{

    animateChart();
};

init();

</script>

</body>
</html>
