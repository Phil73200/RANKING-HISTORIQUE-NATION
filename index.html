<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WC Nations Ranking</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#year{
    position:absolute;
    top:20px;
    right:40px;
    font-size:70px;
    color:#666;
}

#error{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    font-size:20px;
    z-index:999;
}

svg{
    width:100vw;
    height:100vh;
}

.line{
    fill:none;
    stroke-width:4;
}

.label{
    font-size:16px;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="year">1970</div>
<div id="error"></div>

<svg></svg>

<script>

const errorDiv = document.getElementById("error");

fetch("./data.json")
.then(response => {

    if(!response.ok){
        throw new Error("Impossible de charger data.json");
    }

    return response.json();

})
.then(data => {

    console.log(data);

    const svg = d3.select("svg");

    const width = window.innerWidth;
    const height = window.innerHeight;

    const margin = {
        top:100,
        right:120,
        bottom:50,
        left:80
    };

    const chartWidth = width - margin.left - margin.right;
    const chartHeight = height - margin.top - margin.bottom;

    const g = svg.append("g")
        .attr("transform",
            `translate(${margin.left},${margin.top})`
        );

    data.forEach(d => {
        d.Season = +d.Season;
        d.NationRank = +d.NationRank;
    });

    const nations = [...new Set(data.map(d => d.Nation))];

    const seasons = [...new Set(data.map(d => d.Season))]
        .sort((a,b)=>a-b);

    const x = d3.scaleLinear()
        .domain([1970,2026])
        .range([0, chartWidth]);

    const y = d3.scaleLinear()
        .domain([10,1])
        .range([chartHeight,0]);

    const colors = d3.scaleOrdinal(d3.schemeTableau10);

    const line = d3.line()
        .defined(d => d.NationRank)
        .x(d => x(d.Season))
        .y(d => y(d.NationRank))
        .curve(d3.curveMonotoneX);

    // axes

    g.append("g")
        .attr("transform",
            `translate(0,${chartHeight})`
        )
        .call(
            d3.axisBottom(x)
            .tickFormat(d3.format("d"))
        );

    g.append("g")
        .call(d3.axisLeft(y));

    g.selectAll("text")
        .attr("fill","white");

    g.selectAll("line,path")
        .attr("stroke","#666");

    const nationData = nations.map(nation => {

        return {
            nation,
            values: seasons.map(season => {

                const found = data.find(d =>
                    d.Nation === nation &&
                    d.Season === season
                );

                return {
                    Season: season,
                    NationRank: found
                        ? found.NationRank
                        : null
                };

            })
        };

    });

    const paths = g.selectAll(".path")
        .data(nationData)
        .enter()
        .append("path")
        .attr("class","line")
        .attr("stroke",(d,i)=>colors(i));

    const labels = g.selectAll(".label")
        .data(nationData)
        .enter()
        .append("text")
        .attr("class","label")
        .attr("fill",(d,i)=>colors(i))
        .text(d=>d.nation);

    let currentYear = 1970;

    function update(year){

        document.getElementById("year")
            .innerText = year;

        paths.attr("d", d => {

            const filtered =
                d.values.filter(v =>
                    v.Season <= year &&
                    v.NationRank
                );

            return line(filtered);

        });

        labels
            .attr("x", d => {

                const point = d.values.find(v =>
                    v.Season === year &&
                    v.NationRank
                );

                return point
                    ? x(point.Season) + 8
                    : -999;

            })
            .attr("y", d => {

                const point = d.values.find(v =>
                    v.Season === year &&
                    v.NationRank
                );

                return point
                    ? y(point.NationRank)
                    : -999;

            });

    }

    update(currentYear);

    setInterval(() => {

        currentYear++;

        if(currentYear > 2026){
            currentYear = 1970;
        }

        update(currentYear);

    }, 1000);

})
.catch(err => {

    console.error(err);

    errorDiv.innerHTML =
        "ERREUR : " + err.message;

});

</script>

</body>
</html>
