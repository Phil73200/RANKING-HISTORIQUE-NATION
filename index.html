<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#ffffff;
    font-family:Arial,sans-serif;
    color:#222;
}

.container{
    max-width:1500px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:52px;
    margin-bottom:10px;
    color:#17345c;
}

.subtitle{
    text-align:center;
    font-size:20px;
    color:#666;
    margin-bottom:30px;
}

.topbar{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:25px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    background:#e9eef6;
    color:#17345c;
    font-weight:bold;
    font-size:14px;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
}

button.active{
    background:#17345c;
    color:white;
}

.main{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.chartBox{
    flex:1;
    background:white;
    border-radius:22px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.side{
    width:320px;
    background:#17345c;
    color:white;
    border-radius:22px;
    padding:20px;
}

.side h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
    font-size:28px;
}

.rankingItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.08);
}

.rankingItem.france{
    background:#e63946;
}

.rankLeft{
    display:flex;
    gap:12px;
    align-items:center;
}

.rankNation{
    font-weight:bold;
}

canvas{
    width:100% !important;
    height:720px !important;
}

.info{
    margin-top:25px;
    background:#f4f6fa;
    border-radius:14px;
    padding:18px;
    line-height:1.5;
    color:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin • évolution historique des nations
</div>

<div class="topbar">

<button class="active" onclick="changeDataset('global', this)">
GLOBAL
</button>

<button onclick="changeDataset('men', this)">
HOMMES
</button>

<button onclick="changeDataset('women', this)">
DAMES
</button>

<button onclick="changeMode('rank', this)">
PAR RANG
</button>

<button onclick="changeMode('points', this)">
PAR POINTS
</button>

<button onclick="changeSpeed(1200, this)">
VITESSE NORMALE
</button>

<button onclick="changeSpeed(300, this)">
VITESSE RAPIDE
</button>

</div>

<div class="main">

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<div class="side">

<h2>Classement 2026</h2>

<div id="ranking"></div>

</div>

</div>

<div class="info">
Les autres nations sont volontairement atténuées afin de mettre la France davantage en valeur dans la visualisation.
</div>

</div>

<script>

let chart;

let currentDataset = 'global';
let currentMode = 'rank';
let animationSpeed = 1200;

const nationColors = {
    FRA:'#0057b8',
    AUT:'#d62828',
    SUI:'#2a9d8f',
    ITA:'#2b9348',
    USA:'#7b8794',
    NOR:'#8d99ae',
    GER:'#000000',
    CAN:'#ff8800',
    SWE:'#9d4edd',
    BRA:'#2dc653'
};

async function loadData(type){

    const men =
        await fetch('data M.json')
        .then(r => r.json());

    const women =
        await fetch('data W.json')
        .then(r => r.json());

    let data = [];

    if(type === 'men'){

        data = men;

    }else if(type === 'women'){

        data = women;

    }else{

        const map = {};

        [...men, ...women].forEach(d => {

            const key = d.Season + '_' + d.Nation;

            if(!map[key]){

                map[key] = {
                    Season:d.Season,
                    Nation:d.Nation,
                    NationPoints:0
                };

            }

            map[key].NationPoints += d.NationPoints;

        });

        data = Object.values(map);

        const seasons =
            [...new Set(data.map(d => d.Season))];

        let rebuilt = [];

        seasons.forEach(season => {

            let rows =
                data
                .filter(d => d.Season === season)
                .sort((a,b)=>b.NationPoints-a.NationPoints);

            rows.forEach((r,i)=>{

                r.NationRank = i + 1;

                rebuilt.push(r);

            });

        });

        data = rebuilt;

    }

    buildChart(data);

}

function buildChart(data){

    const seasons =
        [...new Set(data.map(d=>d.Season))]
        .sort((a,b)=>a-b);

    const nations =
        [...new Set(data.map(d=>d.Nation))];

    const datasets = nations.map(nation => {

        const rows =
            data.filter(d=>d.Nation===nation);

        const color =
            nationColors[nation] || '#999';

        return {

            label:nation,

            data:seasons.map(season => {

                const found =
                    rows.find(r=>r.Season===season);

                if(!found) return null;

                return currentMode === 'rank'
                    ? found.NationRank
                    : found.NationPoints;

            }),

            borderColor:color,

            backgroundColor:color,

            borderWidth:nation==='FRA' ? 7 : 2,

            pointRadius:nation==='FRA' ? 5 : 1,

            pointHoverRadius:nation==='FRA' ? 8 : 2,

            tension:0.25,

            fill:false,

            borderDash:nation==='FRA' ? [] : [5,5],

            opacity:nation==='FRA' ? 1 : 0.2

        };

    });

    if(chart){

        chart.destroy();

    }

    chart = new Chart(
        document.getElementById('chart'),
        {

        type:'line',

        data:{
            labels:seasons,
            datasets:datasets
        },

        options:{

            responsive:true,

            animation:{
                duration:animationSpeed
            },

            interaction:{
                intersect:false,
                mode:'nearest'
            },

            plugins:{

                legend:{

                    labels:{

                        generateLabels(chart){

                            const labels =
                                Chart.defaults.plugins.legend.labels.generateLabels(chart);

                            labels.forEach(l=>{

                                l.fillStyle =
                                    nationColors[l.text] || '#999';

                                l.strokeStyle =
                                    nationColors[l.text] || '#999';

                            });

                            return labels;

                        }

                    }

                }

            },

            scales:{

                y:{

                    reverse:currentMode==='rank',

                    title:{
                        display:true,
                        text:
                        currentMode==='rank'
                        ? 'Rang mondial'
                        : 'Points'
                    }

                }

            }

        }

    });

    updateRanking(data);

}

function updateRanking(data){

    const ranking =
        data
        .filter(d=>d.Season===2026)
        .sort((a,b)=>a.NationRank-b.NationRank)
        .slice(0,10);

    const container =
        document.getElementById('ranking');

    container.innerHTML='';

    ranking.forEach(r=>{

        const div =
            document.createElement('div');

        div.className='rankingItem';

        if(r.Nation==='FRA'){

            div.classList.add('france');

        }

        div.innerHTML=`

        <div class="rankLeft">

            <strong>${r.NationRank}</strong>

            <span
                class="rankNation"
                style="color:${nationColors[r.Nation] || '#fff'}"
            >
                ${r.Nation}
            </span>

        </div>

        <div>
            ${r.NationPoints.toLocaleString()}
        </div>

        `;

        container.appendChild(div);

    });

}

function clearActiveButtons(){

    document
        .querySelectorAll('.topbar button')
        .forEach(b=>b.classList.remove('active'));

}

function changeDataset(type, btn){

    currentDataset = type;

    loadData(type);

    clearActiveButtons();

    btn.classList.add('active');

}

function changeMode(mode, btn){

    currentMode = mode;

    loadData(currentDataset);

    clearActiveButtons();

    btn.classList.add('active');

}

function changeSpeed(speed, btn){

    animationSpeed = speed;

    clearActiveButtons();

    btn.classList.add('active');

}

loadData('global');

</script>

</body>
</html>
