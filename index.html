<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    background:#f4f6fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#1d2a44;
}

.wrapper{
    width:96%;
    max-width:1700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:54px;
    margin-top:10px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    font-size:20px;
    color:#6b7280;
    margin-bottom:25px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

button{
    border:none;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    background:#dbe3f0;
    color:#1d2a44;
    transition:.2s;
}

button.active{
    background:#165ac7;
    color:white;
}

.main{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:24px;
}

.chartCard{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.side{
    background:#132a58;
    color:white;
    border-radius:24px;
    padding:24px;
}

.sideTitle{
    text-align:center;
    letter-spacing:2px;
    opacity:.8;
    margin-bottom:5px;
}

.bigYear{
    text-align:center;
    font-size:62px;
    font-weight:bold;
    margin-bottom:25px;
}

.rankItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,.08);
    font-size:18px;
}

.rankItem.fr{
    background:linear-gradient(90deg,#1358c8,#dc2626);
    font-weight:bold;
}

canvas{
    height:820px !important;
}

@media(max-width:1200px){

    .main{
        grid-template-columns:1fr;
    }

    canvas{
        height:620px !important;
    }

}

</style>
</head>

<body>

<div class="wrapper">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin • Evolution historique des meilleures nations
</div>

<div class="controls">

    <button onclick="switchData('overall')" class="active" id="btn-overall">
        Overall
    </button>

    <button onclick="switchData('men')" id="btn-men">
        Hommes
    </button>

    <button onclick="switchData('women')" id="btn-women">
        Dames
    </button>

    <button onclick="switchDisplay('rank')" class="active" id="btn-rank">
        Classement
    </button>

    <button onclick="switchDisplay('points')" id="btn-points">
        Points
    </button>

</div>

<div class="main">

<div class="chartCard">
<canvas id="chart"></canvas>
</div>

<div class="side">

<div class="sideTitle">
CLASSEMENT FINAL
</div>

<div class="bigYear">
2026
</div>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

const COLORS = {
    FRA:"#1358c8",
    AUT:"#ef4444",
    SUI:"#14b8a6",
    ITA:"#16a34a",
    USA:"#94a3b8",
    NOR:"#6b7280",
    SWE:"#a855f7",
    GER:"#222222",
    CAN:"#fb923c"
};

const LABELS = {
    FRA:"🇫🇷 France",
    AUT:"🇦🇹 Autriche",
    SUI:"🇨🇭 Suisse",
    ITA:"🇮🇹 Italie",
    USA:"🇺🇸 États-Unis",
    NOR:"🇳🇴 Norvège",
    SWE:"🇸🇪 Suède",
    GER:"🇩🇪 Allemagne",
    CAN:"🇨🇦 Canada"
};

const NATIONS = [
    "SUI",
    "AUT",
    "ITA",
    "USA",
    "NOR",
    "FRA",
    "GER",
    "SWE",
    "CAN"
];

let chart;

let currentMode = "overall";
let currentDisplay = "rank";

let overallData = [];
let menData = [];
let womenData = [];

async function loadAllData() {

    overallData =
        await fetch("data.json")
        .then(r => r.json());

    menData =
        await fetch("data M.json")
        .then(r => r.json());

    womenData =
        await fetch("data W.json")
        .then(r => r.json());

    buildChart(overallData);
}

function switchData(mode) {

    currentMode = mode;

    updateButtons();

    if(mode === "overall") {
        buildChart(overallData);
    }

    if(mode === "men") {
        buildChart(menData);
    }

    if(mode === "women") {
        buildChart(womenData);
    }
}

function switchDisplay(type){

    currentDisplay = type;

    updateButtons();

    if(currentMode === "overall") {
        buildChart(overallData);
    }

    if(currentMode === "men") {
        buildChart(menData);
    }

    if(currentMode === "women") {
        buildChart(womenData);
    }
}

function updateButtons(){

    document.querySelectorAll("button")
        .forEach(btn => btn.classList.remove("active"));

    document.getElementById("btn-" + currentMode)
        .classList.add("active");

    document.getElementById(
        currentDisplay === "rank"
        ? "btn-rank"
        : "btn-points"
    ).classList.add("active");
}

function buildChart(data){

    const years = [...new Set(
        data.map(d=>d.Season)
    )];

    const datasets = NATIONS.map(nation=>{

        const values = years.map(year=>{

            const found = data.find(
                d =>
                    d.Season===year &&
                    d.Nation===nation
            );

            if(!found){
                return null;
            }

            return currentDisplay==="rank"
                ? found.NationRank
                : found.NationPoints;

        });

        const france = nation==="FRA";

        return {

            label:nation,

            data:values,

            borderColor:
                COLORS[nation],

            backgroundColor:"transparent",

            borderWidth:
                france ? 6 : 2,

            pointRadius:0,

            tension:0.35,

            fill:false,

            spanGaps:false

        };

    });

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("chart"),
        {

            type:"line",

            data:{
                labels:years,
                datasets
            },

            options:{

                responsive:true,
                maintainAspectRatio:false,

                animation:{
                    duration:1600,
                    easing:"easeOutQuart"
                },

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{

                    y:{

                        reverse:
                            currentDisplay==="rank",

                        suggestedMin:
                            currentDisplay==="rank"
                            ? 1
                            : 0,

                        suggestedMax:
                            currentDisplay==="rank"
                            ? 10
                            : undefined,

                        ticks:{

                            color:"#111",

                            font:{
                                size:18,
                                weight:"bold"
                            }

                        },

                        title:{
                            display:true,

                            text:
                                currentDisplay==="rank"
                                ? "Rang mondial"
                                : "Points Coupe du Monde",

                            color:"#111",

                            font:{
                                size:26,
                                weight:"bold"
                            }
                        },

                        grid:{
                            color:"rgba(0,0,0,.08)"
                        }

                    },

                    x:{

                        ticks:{

                            color:"#111",

                            callback:function(value){

                                const label =
                                    this.getLabelForValue(value);

                                return label % 5 === 0
                                    ? label
                                    : "";

                            },

                            font:{
                                size:15
                            }

                        },

                        title:{
                            display:true,
                            text:"Saison",
                            color:"#111",
                            font:{
                                size:24,
                                weight:"bold"
                            }
                        },

                        grid:{
                            color:"rgba(0,0,0,.05)"
                        }

                    }

                }

            },

            plugins:[{

                id:"endLabels",

                afterDraw(chart){

                    const { ctx } = chart;

                    ctx.save();

                    chart.data.datasets.forEach((dataset,i)=>{

                        const meta =
                            chart.getDatasetMeta(i);

                        const point =
                            meta.data[
                                meta.data.length - 1
                            ];

                        if(!point){
                            return;
                        }

                        const france =
                            dataset.label==="FRA";

                        ctx.font =
                            france
                            ? "bold 26px Arial"
                            : "bold 18px Arial";

                        ctx.fillStyle =
                            COLORS[dataset.label];

                        ctx.textAlign = "left";

                        ctx.fillText(
                            LABELS[dataset.label],
                            point.x + 18,
                            point.y + 6
                        );

                    });

                    ctx.restore();

                }

            }]

        }
    );

    buildRanking(data);

}

function buildRanking(data){

    const final = data
        .filter(
            d =>
                d.Season===2026 &&
                NATIONS.includes(d.Nation)
        )
        .sort((a,b)=>
            a.NationRank-b.NationRank
        );

    const container =
        document.getElementById("ranking");

    container.innerHTML = "";

    final.forEach(row=>{

        const div =
            document.createElement("div");

        div.className =
            row.Nation==="FRA"
            ? "rankItem fr"
            : "rankItem";

        div.innerHTML = `
            <div>
                ${row.NationRank}.
                ${LABELS[row.Nation]}
            </div>

            <div>
                ${row.NationPoints}
            </div>
        `;

        container.appendChild(div);

    });

}

loadAllData();

</script>

</body>
</html>
