<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classement mondial des nations</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#f5f6fa;
    font-family:Arial, Helvetica, sans-serif;
    color:#1e293b;
}

.container{
    width:96%;
    max-width:1800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:52px;
    margin-top:10px;
    margin-bottom:5px;
    color:#14213d;
}

.subtitle{
    text-align:center;
    color:#667085;
    font-size:20px;
    margin-bottom:25px;
}

.top-controls{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:14px;
    padding:12px 22px;
    background:#e2e8f0;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

button.active{
    background:#0057b8;
    color:white;
}

.main-layout{
    display:flex;
    gap:25px;
    align-items:flex-start;
}

.chart-card{
    flex:1;
    background:white;
    border-radius:26px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

#chart{
    width:100%;
    height:76vh;
}

.sidepanel{
    width:320px;
    background:#14213d;
    border-radius:26px;
    padding:25px;
    color:white;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.sidepanel-title{
    text-align:center;
    font-size:28px;
    margin-bottom:5px;
}

.sidepanel-sub{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    border-radius:14px;
    margin-bottom:12px;
    background:rgba(255,255,255,0.08);
    font-size:18px;
}

.rank-left{
    display:flex;
    gap:12px;
    align-items:center;
}

.france{
    background:linear-gradient(
        90deg,
        rgba(0,87,184,0.65),
        rgba(220,38,38,0.65)
    );
}

@media(max-width:1200px){

    .main-layout{
        flex-direction:column;
    }

    .sidepanel{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin · Evolution historique des meilleures nations
</div>

<div class="top-controls">

<button id="btnRank" class="active">
Classement
</button>

<button id="btnPoints">
Points
</button>

<button id="btnAll" class="active">
Toutes nations
</button>

<button id="btnFrance">
Focus France
</button>

<button id="btnOverall" class="active">
Overall
</button>

<button id="btnMen">
Hommes
</button>

<button id="btnLadies">
Dames
</button>

</div>

<div class="main-layout">

<div class="chart-card">

<div id="chart"></div>

</div>

<div class="sidepanel">

<div class="sidepanel-title">
2026
</div>

<div class="sidepanel-sub">
Classement final
</div>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

let currentMode='rank';
let currentGender='overall';
let franceOnly=false;

const nationColors={

    FRA:'#0057b8',
    AUT:'#d62828',
    SUI:'#2a9d8f',
    ITA:'#2b9348',
    USA:'#7b8794',
    NOR:'#8d99ae',
    GER:'#111111',
    CAN:'#ff8800',
    SWE:'#9d4edd',
    BRA:'#2dc653'
};

const nationFlags={

    FRA:'🇫🇷',
    AUT:'🇦🇹',
    SUI:'🇨🇭',
    ITA:'🇮🇹',
    USA:'🇺🇸',
    NOR:'🇳🇴',
    GER:'🇩🇪',
    CAN:'🇨🇦',
    SWE:'🇸🇪',
    BRA:'🇧🇷'
};

async function loadData(){

    let file='data.json';

    if(currentGender==='men'){
        file='data M.json';
    }

    if(currentGender==='ladies'){
        file='data W.json';
    }

    const response=await fetch(file);

    return await response.json();
}

async function buildChart(){

    const data=await loadData();

    const nations=[
        ...new Set(data.map(d=>d.Nation))
    ];

    const seasons=[
        ...new Set(data.map(d=>d.Season))
    ].sort((a,b)=>a-b);

    const traces=[];

    nations.forEach(nation=>{

        if(franceOnly && nation!=='FRA'){
            return;
        }

        const rows=data.filter(
            d=>d.Nation===nation
        );

        const x=rows.map(r=>r.Season);

        const y=rows.map(r=>
            currentMode==='rank'
            ? r.NationRank
            : r.NationPoints
        );

        const lastRow=rows[rows.length-1];

        traces.push({

            x:x,

            y:y,

            mode:'lines+text',

            name:nation,

            text:[
                ...new Array(x.length-1).fill(''),
                `${nationFlags[nation] || ''} ${nation}`
            ],

            textposition:'middle right',

            textfont:{
                size:nation==='FRA' ? 18 : 13,
                color:nationColors[nation] || '#999'
            },

            line:{
                color:nationColors[nation] || '#999',
                width:nation==='FRA' ? 6 : 2
            },

            opacity:
                nation==='FRA'
                ? 1
                : franceOnly
                    ? 0
                    : 0.35,

            hovertemplate:
                '<b>%{fullData.name}</b><br>' +
                'Saison %{x}<br>' +
                (
                    currentMode==='rank'
                    ? 'Rang %{y}'
                    : 'Points %{y}'
                ) +
                '<extra></extra>'
        });
    });

    const layout={

        paper_bgcolor:'white',
        plot_bgcolor:'white',

        margin:{
            l:80,
            r:120,
            t:20,
            b:60
        },

        xaxis:{

            title:'Saison',

            gridcolor:'#e5e7eb',

            tickmode:'linear',

            dtick:5
        },

        yaxis:{

            title:
                currentMode==='rank'
                ? 'Rang mondial'
                : 'Points',

            autorange:
                currentMode==='rank'
                ? 'reversed'
                : true,

            range:
                currentMode==='rank'
                ? [10,1]
                : undefined,

            gridcolor:'#e5e7eb'
        },

        showlegend:false,

        hovermode:'closest'
    };

    Plotly.newPlot(
        'chart',
        traces,
        layout,
        {
            responsive:true,
            displayModeBar:false
        }
    );

    buildRanking(data);
}

function buildRanking(data){

    const ranking=document.getElementById('ranking');

    ranking.innerHTML='';

    const final2026=data
        .filter(d=>d.Season===2026)
        .sort((a,b)=>a.NationRank-b.NationRank);

    final2026.forEach(row=>{

        if(franceOnly && row.Nation!=='FRA'){
            return;
        }

        const div=document.createElement('div');

        div.className='rank-item';

        if(row.Nation==='FRA'){
            div.classList.add('france');
        }

        div.innerHTML=`

            <div class="rank-left">

                <strong>${row.NationRank}</strong>

                <span>
                    ${nationFlags[row.Nation] || ''}
                    ${row.Nation}
                </span>

            </div>

            <strong>
                ${row.NationPoints}
            </strong>
        `;

        ranking.appendChild(div);
    });
}

function activate(buttonId, group){

    group.forEach(id=>{

        document
            .getElementById(id)
            .classList
            .remove('active');
    });

    document
        .getElementById(buttonId)
        .classList
        .add('active');
}

document.getElementById('btnRank').onclick=()=>{

    currentMode='rank';

    activate(
        'btnRank',
        ['btnRank','btnPoints']
    );

    buildChart();
};

document.getElementById('btnPoints').onclick=()=>{

    currentMode='points';

    activate(
        'btnPoints',
        ['btnRank','btnPoints']
    );

    buildChart();
};

document.getElementById('btnAll').onclick=()=>{

    franceOnly=false;

    activate(
        'btnAll',
        ['btnAll','btnFrance']
    );

    buildChart();
};

document.getElementById('btnFrance').onclick=()=>{

    franceOnly=true;

    activate(
        'btnFrance',
        ['btnAll','btnFrance']
    );

    buildChart();
};

document.getElementById('btnOverall').onclick=()=>{

    currentGender='overall';

    activate(
        'btnOverall',
        ['btnOverall','btnMen','btnLadies']
    );

    buildChart();
};

document.getElementById('btnMen').onclick=()=>{

    currentGender='men';

    activate(
        'btnMen',
        ['btnOverall','btnMen','btnLadies']
    );

    buildChart();
};

document.getElementById('btnLadies').onclick=()=>{

    currentGender='ladies';

    activate(
        'btnLadies',
        ['btnOverall','btnMen','btnLadies']
    );

    buildChart();
};

buildChart();

</script>

</body>
</html>
