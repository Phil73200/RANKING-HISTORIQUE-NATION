<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>World Cup Nations Ranking 1970-2026</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
    body{
        margin:0;
        background:#111;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        overflow:hidden;
    }

    #title{
        position:absolute;
        top:20px;
        left:40px;
        font-size:32px;
        font-weight:bold;
    }

    #year{
        position:absolute;
        top:20px;
        right:40px;
        font-size:64px;
        color:#666;
        font-weight:bold;
    }

    svg{
        width:100vw;
        height:100vh;
    }

    .line{
        fill:none;
        stroke-width:4;
        opacity:0.9;
    }

    .label{
        font-size:18px;
        dominant-baseline:middle;
        font-weight:bold;
    }

</style>
</head>

<body>

<div id="title">ALPINE SKI WORLD CUP NATIONS</div>
<div id="year">1970</div>

<svg></svg>

<script>

const svg = d3.select("svg");

const width = window.innerWidth;
const height = window.innerHeight;

const margin = {
    top:100,
    right:150,
    bottom:50,
    left:80
};

const chartWidth = width - margin.left - margin.right;
const chartHeight = height - margin.top - margin.bottom;

const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

const colors = d3.scaleOrdinal(d3.schemeTableau10);

fetch("data.json")
.then(r => r.json())
.then(data => {

    data.forEach(d => {
        d.Season = +d.Season;
        d.NationRank = +d.NationRank;
    });

    const nations = [...new Set(data.map(d => d.Nation))];

    const seasons = [...new Set(data.map(d => d.Season))]
        .sort((a,b)=>a-b);

    const x = d3.scaleLinear()
        .domain([1970, 2026])
        .range([0, chartWidth]);

    const y = d3.scaleLinear()
        .domain([10,1])
        .range([chartHeight,0]);

    const line = d3.line()
        .defined(d => d.NationRank !== null)
        .x(d => x(d.Season))
        .y(d => y(d.NationRank))
        .curve(d3.curveMonotoneX);

    // AXES

    g.append("g")
        .attr("transform", `translate(0,${chartHeight})`)
        .call(
            d3.axisBottom(x)
                .tickFormat(d3.format("d"))
        )
        .selectAll("text")
        .style("fill","white");

    g.append("g")
        .call(
            d3.axisLeft(y)
                .ticks(10)
        )
        .selectAll("text")
        .style("fill","white");

    g.selectAll(".domain,line")
        .style("stroke","#666");

    // PREP DATA

    const nationData = nations.map(nation => {

        const values = seasons.map(season => {

            const found = data.find(d =>
                d.Nation === nation &&
                d.Season === season
            );

            return {
                Season: season,
                NationRank: found ? found.NationRank : null
            };

        });

        return {
            nation,
            values
        };
    });

    // LINES

    const paths = g.selectAll(".nationLine")
        .data(nationData)
        .enter()
        .append("path")
        .attr("class","line")
        .attr("stroke",(d,i)=>colors(i))
        .datum(d=>d.values)
        .attr("d", line);

    // LABELS

    const labels = g.selectAll(".nationLabel")
        .data(nationData)
        .enter()
        .append("text")
        .attr("class","label")
        .style("fill",(d,i)=>colors(i))
        .text(d=>d.nation);

    // ANIMATION

    let currentYear = 1970;

    function update(year){

        d3.select("#year").text(year);

        paths.attr("d", d => {

            const filtered = d.filter(v => v.Season <= year);

            return line(filtered);

        });

        labels
            .attr("x", d => {

                const point = d.values.find(v => v.Season === year);

                return point
                    ? x(point.Season) + 10
                    : -999;

            })
            .attr("y", d => {

                const point = d.values.find(v => v.Season === year);

                return point
                    ? y(point.NationRank)
                    : -999;

            });

    }

    update(1970);

    setInterval(() => {

        currentYear++;

        if(currentYear > 2026){
            currentYear = 1970;
        }

        update(currentYear);

    }, 1200);

});

</script>

</body>
</html>
