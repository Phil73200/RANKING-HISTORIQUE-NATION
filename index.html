<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIS Alpine Nations Ranking</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#e9ecef;
    font-size:14px;
}

button.active{
    background:#0057b8;
    color:white;
}

.chart-container{
    height:80vh;
}

</style>
</head>

<body>

<div class="container">

<h1>FIS Alpine Nations Ranking</h1>

<div class="subtitle">
Evolution des meilleures nations alpines de 1970 à 2026
</div>

<div class="controls">
    <button id="btnRank" class="active">Classement</button>
    <button id="btnPoints">Points</button>
</div>

<div class="chart-container">
    <canvas id="chart"></canvas>
</div>

</div>

<script>

let currentMode='rank';

const nationColors={
    FRA:'#0057b8',
    AUT:'#d62828',
    SUI:'#2a9d8f',
    ITA:'#2b9348',
    USA:'#7b8794',
    NOR:'#8d99ae',
    GER:'#111111',
    CAN:'#ff8800',
    SWE:'#9d4edd',
    BRA:'#2dc653'
};

async function loadData(){

    const response=await fetch('data_overall.json');

    return await response.json();
}

let chart;

async function buildChart(){

    const data=await loadData();

    const filtered=data.filter(
        d=>d.Nation!=='FIN'
    );

    const nations=[
        ...new Set(filtered.map(d=>d.Nation))
    ];

    const seasons=[
        ...new Set(filtered.map(d=>d.Season))
    ].sort((a,b)=>a-b);

    const datasets=nations.map(nation=>{

        const values=seasons.map(season=>{

            const found=filtered.find(
                d=>
                    d.Season===season
                    && d.Nation===nation
            );

            if(!found){
                return null;
            }

            return currentMode==='rank'
                ? found.NationRank
                : found.NationPoints;
        });

        return{

            label:nation,

            data:values,

            borderColor:nationColors[nation] || '#999',

            backgroundColor:nationColors[nation] || '#999',

            borderWidth:nation==='FRA' ? 5 : 2,

            pointRadius:0,

            tension:0.2,

            spanGaps:false
        };
    });

    if(chart){
        chart.destroy();
    }

    chart=new Chart(
        document.getElementById('chart'),
        {

            type:'line',

            data:{
                labels:seasons,
                datasets:datasets
            },

            options:{

                responsive:true,
                maintainAspectRatio:false,

                animation:false,

                plugins:{
                    legend:{
                        position:'right'
                    }
                },

                scales:{

                    y:{

                        reverse:currentMode==='rank',

                        min:currentMode==='rank'
                            ? 1
                            : undefined,

                        max:currentMode==='rank'
                            ? 10
                            : undefined
                    }
                }
            }
        }
    );
}

document.getElementById('btnRank').onclick=()=>{

    currentMode='rank';

    document.getElementById('btnRank')
        .classList.add('active');

    document.getElementById('btnPoints')
        .classList.remove('active');

    buildChart();
};

document.getElementById('btnPoints').onclick=()=>{

    currentMode='points';

    document.getElementById('btnPoints')
        .classList.add('active');

    document.getElementById('btnRank')
        .classList.remove('active');

    buildChart();
};

buildChart();

</script>

</body>
</html>
