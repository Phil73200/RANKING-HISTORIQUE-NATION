<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Classement mondial des nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    background:#f4f5f9;
    font-family:Arial, Helvetica, sans-serif;
    color:#1d2a44;
}

.wrapper{
    width:96%;
    max-width:1600px;
    margin:auto;
    padding:10px 20px 25px;
}

h1{
    text-align:center;
    font-size:52px;
    margin:5px 0;
    color:#1f2d52;
}

.subtitle{
    text-align:center;
    color:#667085;
    font-size:20px;
    margin-bottom:20px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:18px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:12px 22px;
    border-radius:14px;
    background:#dfe5f1;
    color:#1f2d52;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button.active{
    background:#165ac7;
    color:white;
}

.main{
    display:grid;
    grid-template-columns:1fr 290px;
    gap:20px;
}

.chartBox{
    background:white;
    border-radius:24px;
    padding:20px;
    box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.side{
    background:#17315f;
    border-radius:24px;
    padding:22px;
    color:white;
}

.sideTitle{
    text-align:center;
    letter-spacing:2px;
    opacity:0.8;
    margin-top:6px;
    font-size:14px;
}

.bigYear{
    text-align:center;
    font-size:62px;
    font-weight:800;
    color:#c8ddb5;
    margin:8px 0 22px;
}

.rankItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    margin-bottom:10px;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    font-size:18px;
}

.rankItem.fr{
    background:linear-gradient(90deg,#1b4fc9,#cf294b);
    font-weight:bold;
}

canvas{
    height:500px !important;
}

@media(max-width:1200px){

    .main{
        grid-template-columns:1fr;
    }

    canvas{
        height:420px !important;
    }

}

</style>
</head>

<body>

<div class="wrapper">

<h1>Classement mondial des nations</h1>

<div class="subtitle">
Coupe du Monde de ski alpin • Evolution historique des meilleures nations
</div>

<div class="controls">

<button class="active" id="btn-overall"
onclick="switchMode('overall')">
Overall
</button>

<button id="btn-men"
onclick="switchMode('men')">
Hommes
</button>

<button id="btn-women"
onclick="switchMode('women')">
Dames
</button>

<button id="btn-rank"
class="active"
onclick="switchDisplay('rank')">
Par rang
</button>

<button id="btn-points"
onclick="switchDisplay('points')">
Par points
</button>

</div>

<div class="main">

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<div class="side">

<div class="sideTitle">
CLASSEMENT FINAL
</div>

<div class="bigYear">
2026
</div>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

const COLORS = {
    FRA:"#1358c8",
    AUT:"#ef4444",
    SUI:"#14b8a6",
    ITA:"#16a34a",
    USA:"#a0aec0",
    NOR:"#6b7280",
    GER:"#2f2f2f"
};

const LABELS = {
    FRA:"🇫🇷 France",
    AUT:"🇦🇹 Autriche",
    SUI:"🇨🇭 Suisse",
    ITA:"🇮🇹 Italie",
    USA:"🇺🇸 États-Unis",
    NOR:"🇳🇴 Norvège",
    GER:"🇩🇪 Allemagne"
};

const NATIONS = [
    "SUI",
    "AUT",
    "ITA",
    "USA",
    "NOR",
    "FRA",
    "GER"
];

let overallData = [];
let menData = [];
let womenData = [];

let currentMode = "overall";
let currentDisplay = "rank";

let chart;

async function loadData(){

    overallData =
        await fetch("data.json")
        .then(r=>r.json());

    menData =
        await fetch("data M.json")
        .then(r=>r.json());

    womenData =
        await fetch("data W.json")
        .then(r=>r.json());

    buildChart(overallData);

}

function switchMode(mode){

    currentMode = mode;

    updateButtons();

    if(mode==="overall"){
        buildChart(overallData);
    }

    if(mode==="men"){
        buildChart(menData);
    }

    if(mode==="women"){
        buildChart(womenData);
    }

}

function switchDisplay(type){

    currentDisplay = type;

    updateButtons();

    if(currentMode==="overall"){
        buildChart(overallData);
    }

    if(currentMode==="men"){
        buildChart(menData);
    }

    if(currentMode==="women"){
        buildChart(womenData);
    }

}

function updateButtons(){

    document.querySelectorAll(".controls button")
        .forEach(btn=>btn.classList.remove("active"));

    document.getElementById("btn-" + currentMode)
        .classList.add("active");

    document.getElementById(
        currentDisplay==="rank"
        ? "btn-rank"
        : "btn-points"
    ).classList.add("active");

}

function buildChart(data){

    const years = [...new Set(
        data.map(d=>d.Season)
    )];

    const datasets = NATIONS.map(nation=>{

        const values = years.map(year=>{

            const row = data.find(
                d =>
                    d.Season===year &&
                    d.Nation===nation
            );

            if(!row){
                return null;
            }

            return currentDisplay==="rank"
                ? row.NationRank
                : row.NationPoints;

        });

        const france = nation==="FRA";

        return {

            label:nation,

            data:values,

            borderColor:COLORS[nation],

            borderWidth:
                france ? 5 : 2.5,

            pointRadius:
                france ? 4 : 1.5,

            pointHoverRadius:
                france ? 6 : 3,

            pointBackgroundColor:
                france ? "#ef4444" : COLORS[nation],

            pointBorderColor:"white",

            pointBorderWidth:
                france ? 2 : 0,

            tension:0.35,

            fill:false,

            spanGaps:true

        };

    });

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("chart"),
        {

            type:"line",

            data:{
                labels:years,
                datasets
            },

            options:{

                responsive:true,
                maintainAspectRatio:false,

               animation:{
    x:{
        duration:0
    },
    y:{
        duration:1800,
        easing:"easeOutQuart",
        from:10
    }
},

                layout:{
                    padding:{
                        right:160
                    }
                },

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{

                    y:{

                        reverse:
                            currentDisplay==="rank",

                        min:
                            currentDisplay==="rank"
                            ? 1
                            : 0,

                        max:
                            currentDisplay==="rank"
                            ? 10
                            : undefined,

                        ticks:{

                            stepSize:
                                currentDisplay==="rank"
                                ? 1
                                : undefined,

                            color:"#333",

                            font:{
                                size:14,
                                weight:"bold"
                            }

                        },

                        title:{
                            display:true,

                            text:
                                currentDisplay==="rank"
                                ? "Rang mondial"
                                : "Points (Coupe des nations)",

                            color:"#333",

                            font:{
                                size:18,
                                weight:"bold"
                            }
                        },

                        grid:{
                            color:"rgba(0,0,0,0.05)"
                        }

                    },

                    x:{

                        ticks:{

                            color:"#444",

                            callback:function(value){

                                const label =
                                    this.getLabelForValue(value);

                                return label % 5 === 0
                                    ? label
                                    : "";

                            },

                            font:{
                                size:12
                            }

                        },

                        title:{
                            display:true,
                            text:"Saison",
                            color:"#333",

                            font:{
                                size:18,
                                weight:"bold"
                            }
                        },

                        grid:{
                            color:"rgba(0,0,0,0.04)"
                        }

                    }

                }

            },

            plugins:[{

                id:"endLabels",

                afterDraw(chart){

                    const { ctx } = chart;

                    ctx.save();

                    chart.data.datasets.forEach((dataset,i)=>{

                        const meta =
                            chart.getDatasetMeta(i);

                        const point =
                            meta.data[
                                meta.data.length - 1
                            ];

                        if(!point){
                            return;
                        }

                        const france =
                            dataset.label==="FRA";

                        ctx.font =
                            france
                            ? "bold 22px Arial"
                            : "bold 14px Arial";

                        ctx.fillStyle =
                            COLORS[dataset.label];

                        ctx.textAlign = "left";

                        ctx.fillText(
                            LABELS[dataset.label],
                            point.x + 18,
                            point.y + 5
                        );

                    });

                    ctx.restore();

                }

            }]

        }
    );

    buildRanking(data);

}

function buildRanking(data){

    const final = data
        .filter(
            d =>
                d.Season===2026 &&
                NATIONS.includes(d.Nation)
        )
        .sort((a,b)=>
            a.NationRank-b.NationRank
        );

    const container =
        document.getElementById("ranking");

    container.innerHTML = "";

    final.forEach(row=>{

        const div =
            document.createElement("div");

        div.className =
            row.Nation==="FRA"
            ? "rankItem fr"
            : "rankItem";

        div.innerHTML = `
            <div>
                ${row.NationRank}. ${LABELS[row.Nation]}
            </div>

            <div>
                ${row.NationPoints}
            </div>
        `;

        container.appendChild(div);

    });

}

loadData();

</script>

</body>
</html>
