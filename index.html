<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WC Nations</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial;
    background:white;
    margin:0;
    padding:20px;
}

#chartBox{
    width:100%;
    height:90vh;
}
</style>

</head>

<body>

<h2>FIS Alpine Nations Ranking</h2>

<canvas id="chartBox"></canvas>

<script>

fetch('data.json')
.then(r=>r.json())
.then(data=>{

    const nations=[...new Set(data.map(d=>d.Nation))];

    const seasons=[
        ...new Set(data.map(d=>d.Season))
    ].sort((a,b)=>a-b);

    const colors={
        FRA:'#0057b8',
        AUT:'#d62828',
        SUI:'#2a9d8f',
        ITA:'#2b9348',
        USA:'#7b8794',
        NOR:'#8d99ae',
        GER:'#111111',
        CAN:'#ff8800',
        SWE:'#9d4edd',
        BRA:'#2dc653'
    };

    const datasets=nations.map(nation=>{

        return{

            label:nation,

            data:seasons.map(season=>{

                const row=data.find(
                    d=>
                        d.Season===season
                        && d.Nation===nation
                );

                return row ? row.NationRank : null;
            }),

            borderColor:colors[nation] || '#999',

            borderWidth:nation==='FRA' ? 5 : 2,

            pointRadius:0,

            tension:0.2
        };
    });

    new Chart(
        document.getElementById('chartBox'),
        {

            type:'line',

            data:{
                labels:seasons,
                datasets:datasets
            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                animation:false,

                plugins:{
                    legend:{
                        position:'right'
                    }
                },

                scales:{
                    y:{
                        reverse:true,
                        min:1,
                        max:20
                    }
                }
            }
        }
    );

})
.catch(err=>{
    document.body.innerHTML +=
        '<h3 style="color:red;">ERREUR : '
        + err +
        '</h3>';
});

</script>

</body>
</html>
